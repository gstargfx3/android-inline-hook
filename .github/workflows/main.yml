name: Build ShadowHook Static
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      # FIXED: Using the official setup-java repository
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # FIXED: Using the official setup-android repository
      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;23.2.8568313;cmake;3.22.1'

      - name: Build Static Library
        run: |
          chmod +x gradlew
          # Override CMake version to 3.22.1 and point to the SDK install path
          ./gradlew :shadowhook:assembleRelease \
            -Pandroid.extractNativeLibs=false \
            -Dcmake.dir=$ANDROID_SDK_ROOT/cmake/3.22.1

      - name: Collect ARM64 Static Library
        run: |
          mkdir -p output/arm64-v8a
          # Finding libshadowhook.a specifically for ARM64
          find . -name "libshadowhook.a" | grep "arm64-v8a" | xargs -I {} cp {} output/arm64-v8a/
          echo "Files collected:"
          ls -R output/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShadowHook-Static-v2.0.0
          path: output/
