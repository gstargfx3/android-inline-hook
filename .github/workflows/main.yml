name: Build ShadowHook Static
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: android-actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          # We force a stable CMake version that works with NDK 23
          packages: 'ndk;23.2.8568313;cmake;3.22.1'

      - name: Build Static Library
        run: |
          chmod +x gradlew
          # We override the CMake version requirement from the command line 
          # to prevent the "CMake 4.0.3 not found" error.
          ./gradlew :shadowhook:assembleRelease \
            -Pandroid.extractNativeLibs=false \
            -Dcmake.dir=/usr/local/lib/android/sdk/cmake/3.22.1

      - name: Collect ARM64 Static Library
        run: |
          mkdir -p output/arm64-v8a
          # Finding the .a file specifically for your OnePlus 9 Pro (ARM64)
          find . -name "libshadowhook.a" | grep "arm64-v8a" | xargs -I {} cp {} output/arm64-v8a/
          echo "Files collected:"
          ls -R output/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShadowHook-Static-v2.0.0
          path: output/
