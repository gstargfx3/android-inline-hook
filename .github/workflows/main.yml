name: Build ShadowHook Static
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          # This builds the release version including the static libraries
          ./gradlew :shadowhook:assembleRelease

      - name: Find and Collect .a Files
        run: |
          mkdir -p output/static
          # Find all libshadowhook.a files and copy them to output
          find shadowhook/build -name "libshadowhook.a" -exec cp {} output/static/ \;
          ls -R output/static

      - name: Upload Static Library
        uses: actions/upload-artifact@v4
        with:
          name: shadowhook-static-libs
          path: output/static/
          
