name: Build ShadowHook Static
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          # FIXED: Separated with a space and wrapped in quotes
          packages: "ndk;23.2.8568313 cmake;3.22.1"

      - name: Build Static Library
        run: |
          chmod +x gradlew
          # Pointing Gradle to the exact CMake version installed by the setup-android step
          ./gradlew :shadowhook:assembleRelease \
            -Pandroid.extractNativeLibs=false \
            -Dcmake.dir=$ANDROID_SDK_ROOT/cmake/3.22.1

      - name: Collect ARM64 Static Library
        run: |
          mkdir -p output/arm64-v8a
          find . -name "libshadowhook.a" | grep "arm64-v8a" | xargs -I {} cp {} output/arm64-v8a/
          echo "Files collected:"
          ls -R output/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShadowHook-Static-v2.0.0
          path: output/
